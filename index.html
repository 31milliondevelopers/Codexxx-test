<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница пихлюна</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #f5f8ff 0%, #edf2ff 100%);
      color: #1f2937;
    }

    .card {
      width: min(100%, 560px);
      background-color: #ffffff;
      border-radius: 18px;
      box-shadow: 0 20px 45px rgba(17, 24, 39, 0.12);
      padding: 44px 36px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.7rem);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    h2 {
      margin: 14px 0 0;
      font-size: 1.1rem;
      font-weight: 500;
      color: #4b5563;
    }

    p {
      margin: 22px auto 0;
      max-width: 42ch;
      font-size: 1rem;
      line-height: 1.6;
      color: #374151;
    }

    .button {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 24px;
      border-radius: 12px;
      background-color: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.25);
    }

    .button:hover {
      background-color: #1d4ed8;
      transform: translateY(-1px);
      box-shadow: 0 12px 22px rgba(29, 78, 216, 0.3);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Страница пихлюна</h1>
    <h2>Created with Codex</h2>
    <p>This is my first simple webpage built step by step.</p>
    <a class="button" href="#">Contact me</a>
  </main>
</body>
</html>
